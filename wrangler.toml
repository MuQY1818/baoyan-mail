name = "baoyan-mail"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true

[vars]
SOURCE_URL = "https://raw.githubusercontent.com/CS-BAOYAN/CS-BAOYAN-DDL/main/src/data/schools.json"
BAOYANXINXI_SOURCE_URL = "https://www.baoyanxinxi.cn/2026jsjby/"
APP_BASE_URL = "https://baoyan.example.com"
MAIL_PROVIDER = "aliyun"
SENDER_NAME = "保研通知"
ALIYUN_DM_ACCOUNT_NAME = "notify@example.com"
ALIYUN_DM_ENDPOINT = "https://dm.aliyuncs.com/"
ALIYUN_REGION_ID = "cn-hangzhou"
BATCH_SIZE = "50"

[triggers]
# Cloudflare Cron 使用 UTC 时间。这里是每天北京时间 09:00。
crons = ["0 1 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "baoyan-mail-db"
database_id = "00000000-0000-0000-0000-000000000000"
